<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset GULIT password</title>
</head>
<body>
  <p>Opening password reset...</p>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get("code") || params.get("token") || "";
      if (token) {
        sessionStorage.setItem("gulit:passwordResetToken", token);
      }
      window.location.replace("../#/auth");
    })();
  </script>
</body>
</html>
